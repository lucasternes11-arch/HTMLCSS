<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="main.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta</title>
</head>
<body id="fundo">
    <h1><strong>Fazer cadastro:</strong></h1>
    <p></p>
    <nav>
    <label for="nome">Nome completo:</label>
    <input type="name" id="nome" name="nome">
    <br><br>
    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email">
    <br><br>
    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha">
    <br><br>
    <label for="senha">Confirmar senha:</label>
    <input type="password" id="senha" name="senha">
    <br><br>
    <label for="data">Data:</label>
    <input type="date" id="data" name="data">
    <br><br>
    <label>Informe seu gênero:</label>
    <br><br>
    <input type="radio" id="masc" name="genero" value="masculino">
    <label for="masc">Masculino</label>
    <input type="radio" id="fem" name="genero" value="feminino">
    <label for="fem">Feminino</label>
    <br><br>
    <label for="pais">País:</label>
    <select id="pais" name="pais">
        <option value="Brasil">Brasil</option>
        <option value="Argentina">Argentina</option>
        <option value="Chile">Chile</option>
    </select>
    <br><br>
    <input name="Termos" type="checkbox" id="teste">Aceito os termos de uso
    </nav>
    <button type="submit"><a href="index.html">Criar conta</a></button>
    <br><br>
    <button type="submit"><a href="login.html">Voltar para a tela de login</a></button>
</body>
</html>
